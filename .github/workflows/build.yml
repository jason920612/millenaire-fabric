name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --stacktrace
        # Note: this compiles + assembles the mod. It does NOT run the L1–L3 content/world
        # behaviour, which needs a separately-obtained Millénaire content tree (not in this repo).
